<!DOCTYPE html>
<html>
<head>
    <style>
        html, body { width: 100%; height: 100%; }
        body { margin: 0; padding: 0; background: #000; overflow: hidden; }
        #player { width: 100%; height: 100%; }
    </style>
</head>
<body>
<div id="player"></div>
<script>
(function () {
    function parseQuery(qs) {
        var p = {}, t, re = /[?&]?([^=]+)=([^&]*)/g;
        qs = qs.split('+').join(' ');
        while ((t = re.exec(qs))) p[decodeURIComponent(t[1])] = decodeURIComponent(t[2]);
        return p;
    }

    var q         = parseQuery(document.location.search);
    var VIDEO_ID  = q.v || '';
    var START_SEC = q.start ? parseInt(q.start, 10) : 0;

    window.MediaPlayer = {
        player:     null,
        _syncTime:  START_SEC,   // last known video position (seconds)
        _syncSetAt: Date.now(),  // wall-clock when _syncTime was recorded

        isReady: function () {
            return !!this.player && typeof this.player.seekTo === 'function';
        },

        // Expected video position right now, extrapolated from the last sync.
        _target: function () {
            return this._syncTime + (Date.now() - this._syncSetAt) / 1000;
        },

        _record: function (t) {
            this._syncTime  = t;
            this._syncSetAt = Date.now();
        },

        setVolume: function (v) {
            if (this.isReady()) this.player.setVolume(v);
        },

        play: function () {
            if (this.isReady()) this.player.playVideo();
        },

        pause: function () {
            if (this.isReady()) this.player.pauseVideo();
        },

        // Direct seek — no diffTime guard.
        // Used by the Skip Ad button, the 6-second init timer, and pause/resume.
        seek: function (t) {
            this._record(t);
            if (this.isReady()) this.player.seekTo(t, true);
        },

        // Drift-correcting sync with a 2-second guard to prevent micro-stutters
        // during normal playback.  Used by the Lua Think() periodic sync.
        // Also acts as the automatic ad-skip path once drift > 2 s.
        syncTo: function (t) {
            this._record(t);
            if (!this.isReady()) return;
            if (Math.abs(this.player.getCurrentTime() - t) < 2) return;
            this.player.seekTo(t, true);
        }
    };

    var tag = document.createElement('script');
    tag.src = 'https://www.youtube.com/iframe_api';
    document.head.appendChild(tag);

    window.onYouTubeIframeAPIReady = function () {
        window.MediaPlayer.player = new YT.Player('player', {
            videoId: VIDEO_ID,
            playerVars: {
                autoplay:       1,
                controls:       0,
                cc_load_policy: 1,
                disablekb:      1,
                modestbranding: 1,
                rel:            0,
                showinfo:       0,
                start:          START_SEC
            },
            events: {
                onReady: function (e) { e.target.playVideo(); }
            }
        });
    };

    // YouTube's iframe player sends postMessage events to this parent page.
    // "infoDelivery" events carry live player state, including a "playerAdParams"
    // field that is present whenever an ad is loading or playing.
    // On detection we seek to the extrapolated current video position to
    // interrupt the ad.  Throttled to once per second to avoid spam.
    var _lastAdSeek = 0;
    window.addEventListener('message', function (e) {
        var data;
        try { data = JSON.parse(e.data); } catch (err) { return; }
        if (!data || data.event !== 'infoDelivery' || !data.info) return;
        if (!data.info.playerAdParams) return;

        var now = Date.now();
        if (now - _lastAdSeek < 1000) return;
        _lastAdSeek = now;

        var p = window.MediaPlayer.player;
        if (!p || !p.seekTo) return;

        var t = Math.floor(window.MediaPlayer._target());
        p.seekTo(Math.max(t, 0), true);
    });

    // Also auto-click the native YouTube skip button for skippable ads —
    // works independently of seekTo and handles all skippable ad types.
    setInterval(function () {
        var btn = document.querySelector(
            '.ytp-ad-skip-button, .ytp-ad-skip-button-modern, .ytp-skip-ad-button'
        );
        if (btn && btn.offsetParent !== null) btn.click();
    }, 500);
}());
</script>
</body>
</html>
