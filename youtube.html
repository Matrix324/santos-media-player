<!DOCTYPE html>
<html>
<head>
    <style>
        html, body { width: 100%; height: 100%; }
        body { margin: 0; padding: 0; background: #000; overflow: hidden; }
        #player { width: 100%; height: 100%; }
    </style>
</head>
<body>
<div id="player"></div>
<script>
(function () {
    function parseQuery(qs) {
        var p = {}, t, re = /[?&]?([^=]+)=([^&]*)/g;
        qs = qs.split('+').join(' ');
        while ((t = re.exec(qs))) p[decodeURIComponent(t[1])] = decodeURIComponent(t[2]);
        return p;
    }

    var q         = parseQuery(document.location.search);
    var VIDEO_ID  = q.v || '';
    var START_SEC = q.start ? parseInt(q.start, 10) : 0;

    window.MediaPlayer = {
        player:     null,
        _syncTime:  START_SEC,
        _syncSetAt: Date.now(),

        isReady: function () {
            return !!this.player && typeof this.player.seekTo === 'function';
        },

        _target: function () {
            return this._syncTime + (Date.now() - this._syncSetAt) / 1000;
        },

        _record: function (t) {
            this._syncTime  = t;
            this._syncSetAt = Date.now();
        },

        setVolume: function (v) { if (this.isReady()) this.player.setVolume(v); },
        play:      function ()  { if (this.isReady()) this.player.playVideo(); },
        pause:     function ()  { if (this.isReady()) this.player.pauseVideo(); },

        seek: function (t) {
            this._record(t);
            if (this.isReady()) this.player.seekTo(t, true);
        },

        syncTo: function (t) {
            this._record(t);
            if (!this.isReady()) return;
            if (Math.abs(this.player.getCurrentTime() - t) < 2) return;
            this.player.seekTo(t, true);
        },

        skipAd: function (t) {
            if (t != null) this._record(t);
            // Reload at the current video position — creates a fresh player
            // session that bypasses the current ad entirely.
            window.location.replace(
                window.location.pathname +
                '?v='     + encodeURIComponent(VIDEO_ID) +
                '&start=' + Math.floor(Math.max(this._target(), 0))
            );
        }
    };

    var tag = document.createElement('script');
    tag.src = 'https://www.youtube.com/iframe_api';
    document.head.appendChild(tag);

    window.onYouTubeIframeAPIReady = function () {
        window.MediaPlayer.player = new YT.Player('player', {
            host:    'https://www.youtube-nocookie.com',
            videoId: VIDEO_ID,
            playerVars: {
                autoplay:       1,
                controls:       0,
                cc_load_policy: 1,
                disablekb:      1,
                modestbranding: 1,
                rel:            0,
                showinfo:       0,
                start:          START_SEC
            },
            events: {
                onReady: function (e) { e.target.playVideo(); }
            }
        });
    };

    // YouTube's player sends infoDelivery postMessages to this parent page
    // with live player state including ad parameters.
    //
    // For skippable ads, playerAdParams contains skipOffsetMilliseconds —
    // the exact time (from ad start) when the native skip button appears.
    // We track this and fire skipAd() at that precise moment automatically.
    //
    // Non-skippable ads have no skipOffsetMilliseconds and must be waited
    // out (or the manual Skip Ad button in the TV menu can reload the page).

    var _adActive    = false;
    var _adStartedAt = 0;
    var _skipTimer   = null;

    function _autoSkip() {
        if (!_adActive) return;
        // Try seekTo first — instant if this ad type allows it.
        var p = window.MediaPlayer.player;
        if (p && p.seekTo) p.seekTo(Math.max(Math.floor(window.MediaPlayer._target()), 0), true);
        // If the ad is still playing 700 ms later, do a full page reload.
        setTimeout(function () {
            if (_adActive) window.MediaPlayer.skipAd();
        }, 700);
    }

    window.addEventListener('message', function (e) {
        var data;
        try { data = JSON.parse(e.data); } catch (err) { return; }
        if (!data || data.event !== 'infoDelivery' || !data.info) return;

        var params = data.info.playerAdParams;

        if (!params) {
            // playerAdParams gone means content is now playing.
            _adActive = false;
            if (_skipTimer) { clearTimeout(_skipTimer); _skipTimer = null; }
            return;
        }

        // An ad is active.
        if (!_adActive) {
            _adActive    = true;
            _adStartedAt = Date.now();
        }

        // Schedule the auto-skip for the moment the skip button appears.
        // skipOffsetMilliseconds is only present for skippable ads.
        if (_skipTimer === null && params.skipOffsetMilliseconds != null) {
            var elapsed = Date.now() - _adStartedAt;
            var delay   = Math.max(params.skipOffsetMilliseconds - elapsed, 0);
            _skipTimer  = setTimeout(function () {
                _skipTimer = null;
                _autoSkip();
            }, delay);
        }
    });
}());
</script>
</body>
</html>
